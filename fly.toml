app = "deep-bot"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[env]
  DEEPCHARTS_URL         = "https://www.deepcharts.com/"
  DEEPCHARTS_PRICING_URL = "https://www.deepcharts.com/pricing"
  DEEPCHARTS_YOUTUBE_URL = "https://www.youtube.com/@deepcharts-official"
  TICKETS_FILE           = "/data/tickets.json"

[[mounts]]
  source      = "deepbot_data"
  destination = "/data"

[[vm]]
  size     = "shared-cpu-1x"
  memory   = "256mb"
  cpu_kind = "shared"
  cpus     = 1

[deploy]
  strategy = "immediate"

# Long-polling bot — keep one machine running, no HTTP service.
[processes]
  app = "/app/deep-bot"
